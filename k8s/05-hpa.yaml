apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: back-ventas-hpa
  namespace: ep3
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: back-ventas-deployment
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
---
