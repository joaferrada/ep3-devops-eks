apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-ventas-deployment
  namespace: ep3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: back-ventas
  template:
    metadata:
      labels:
        app: back-ventas
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: back-ventas
          image: 808183399821.dkr.ecr.us-east-1.amazonaws.com/ep3/ep3-back-ventas:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: DB_ENDPOINT
              value: mysql-service
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: ventas_db
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-service:3306/ventas_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: back-ventas-service
  namespace: ep3
spec:
  type: ClusterIP
  selector:
    app: back-ventas
  ports:
    - port: 8081
      targetPort: 8081